name: Sync upstream releases

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force build even if upstream tag already exists locally'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.check.outputs.new_tag }}
      has_new: ${{ steps.check.outputs.has_new }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Check for new upstream release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM=$(gh release view --repo resmoio/kubernetes-event-exporter --json tagName -q .tagName)
          echo "Upstream latest: ${UPSTREAM}"
          if git tag | grep -qx "${UPSTREAM}" && [ "${{ inputs.force }}" != "true" ]; then
            echo "has_new=false" >> $GITHUB_OUTPUT
            echo "Already have ${UPSTREAM}"
          else
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "new_tag=${UPSTREAM}" >> $GITHUB_OUTPUT
            echo "New release found: ${UPSTREAM}"
          fi

  build:
    needs: check
    if: needs.check.outputs.has_new == 'true'
    uses: ./.github/workflows/docker.yaml
    with:
      upstream_tag: ${{ needs.check.outputs.new_tag }}
    permissions:
      contents: read
      packages: write

  scan:
    needs: [check, build]
    if: needs.check.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/obezpalko/kubernetes-event-exporter:${{ needs.check.outputs.new_tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  tag:
    needs: [check, build, scan]
    if: needs.check.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create tag
        if: inputs.force != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.check.outputs.new_tag }}
          git push origin ${{ needs.check.outputs.new_tag }}

  update-chart:
    needs: [check, tag]
    if: needs.check.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bump chart appVersion and version
        run: |
          NEW_TAG="${{ needs.check.outputs.new_tag }}"
          APP_VERSION="${NEW_TAG#v}"

          # Bump appVersion
          sed -i "s/^appVersion:.*/appVersion: \"${APP_VERSION}\"/" chart/Chart.yaml

          # Increment chart version patch (e.g. 0.1.2 -> 0.1.3)
          CURRENT=$(grep '^version:' chart/Chart.yaml | awk '{print $2}')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_CHART_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version:.*/version: ${NEW_CHART_VERSION}/" chart/Chart.yaml

          echo "Updated chart: version ${NEW_CHART_VERSION}, appVersion ${APP_VERSION}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chart/Chart.yaml
          git commit -m "chore: bump chart appVersion to ${{ needs.check.outputs.new_tag }}"
          git push origin master
