name: Build and push Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Upstream resmoio/kubernetes-event-exporter tag to build (e.g. v1.7)'
        required: true
        default: 'v1.7'
  workflow_call:
    inputs:
      upstream_tag:
        description: 'Upstream tag to build'
        required: true
        type: string

env:
  IMAGE: ghcr.io/obezpalko/kubernetes-event-exporter

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version
        id: version
        run: |
          TAG="${{ inputs.upstream_tag || github.event.inputs.upstream_tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
        include:
          - platform: amd64
            runner: ubuntu-latest
          - platform: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          repository: resmoio/kubernetes-event-exporter
          ref: ${{ needs.prepare.outputs.tag }}
          path: upstream

      - name: Copy Dockerfile into upstream source
        run: cp Dockerfile upstream/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: upstream
          file: upstream/Dockerfile
          platforms: linux/${{ matrix.platform }}
          push: true
          provenance: false
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            TARGETOS=linux
            TARGETARCH=${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          HASH="${{ steps.build.outputs.digest }}"
          echo "${HASH#sha256:}" > /tmp/digests/${{ matrix.platform }}.digest

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform }}
          path: /tmp/digests/${{ matrix.platform }}.digest
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${{ needs.prepare.outputs.version }}"

          DIGESTS=""
          for f in /tmp/digests/digest-*/*.digest; do
            HASH=$(tr -d '\n\r ' < "$f")
            DIGESTS="$DIGESTS ${{ env.IMAGE }}@sha256:$HASH"
          done

          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:${TAG} \
            -t ${{ env.IMAGE }}:${VERSION} \
            -t ${{ env.IMAGE }}:latest \
            $DIGESTS

      - name: Summary
        run: |
          echo "### Docker image pushed" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE }}:${{ needs.prepare.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "Platforms: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
