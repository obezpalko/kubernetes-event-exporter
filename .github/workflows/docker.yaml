name: Build and push Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Upstream resmoio/kubernetes-event-exporter tag to build (e.g. v1.7)'
        required: true
        default: 'v1.7'
  workflow_call:
    inputs:
      upstream_tag:
        description: 'Upstream tag to build'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          repository: resmoio/kubernetes-event-exporter
          ref: ${{ inputs.upstream_tag || github.event.inputs.upstream_tag || github.ref_name }}
          path: upstream

      - name: Copy Dockerfile into upstream source
        run: cp Dockerfile upstream/Dockerfile

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          TAG="${{ inputs.upstream_tag || github.event.inputs.upstream_tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kubernetes-event-exporter
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: upstream
          file: upstream/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
